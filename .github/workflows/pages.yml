name: deploy terminal to github pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: build static terminal
        working-directory: app
        env:
          EXPORT: "1"
          NEXT_PUBLIC_BASE_PATH: /matchbook
          # Public endpoints for the live feed. Set these as repo variables
          # (Settings → Secrets and variables → Actions → Variables):
          #   NEXT_PUBLIC_INDEXER_URL  https://<your-fly-app>.fly.dev
          #   NEXT_PUBLIC_RPC_URL      https://api.devnet.solana.com (default)
          # If NEXT_PUBLIC_INDEXER_URL is unset the terminal shows the mock feed.
          NEXT_PUBLIC_RPC_URL: ${{ vars.NEXT_PUBLIC_RPC_URL || 'https://api.devnet.solana.com' }}
          NEXT_PUBLIC_INDEXER_URL: ${{ vars.NEXT_PUBLIC_INDEXER_URL }}
        run: |
          npm ci
          npx next build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
