name: devnet airdrop

# The devnet faucet rate-limits by IP and dev machines burn through the
# allowance fast; hosted runners usually get through. Dispatch this to
# top up a devnet wallet (defaults to the deploy payer).

on:
  workflow_dispatch:
    inputs:
      address:
        description: "recipient pubkey"
        default: "9fxLpiKzK1zeF42911g5ruKDdTuJFduJSEXcZHh4mCB1"
      amount:
        description: "SOL to request"
        default: "5"
      rounds:
        description: "retry rounds (90s apart)"
        default: "8"

permissions: {}

jobs:
  airdrop:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: request airdrop
        env:
          ADDRESS: ${{ inputs.address }}
          AMOUNT: ${{ inputs.amount }}
          ROUNDS: ${{ inputs.rounds }}
        run: node scripts/airdrop.mjs
